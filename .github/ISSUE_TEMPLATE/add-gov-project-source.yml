name: Add government project source
description: 补充政府数字化、公共资源交易、科技项目或园区项目公开来源入口
title: "[Gov Source] 来源名称"
labels: ["government-source", "needs-triage"]
body:
  - type: input
    id: project_or_portal
    attributes:
      label: 项目或入口名称
      placeholder: 例如：云南省公共资源交易信息网数字化项目入口
    validations:
      required: true
  - type: input
    id: buyer_or_org
    attributes:
      label: 采购人 / 机构 / 平台
      placeholder: 不确定可写 unknown
    validations:
      required: true
  - type: input
    id: source_url
    attributes:
      label: 公开来源链接
      placeholder: https://...
    validations:
      required: true
  - type: textarea
    id: relevance
    attributes:
      label: 为什么和技术/数字化机会有关？
      description: 如果只是门户入口，请说明它只是入口，不是具体项目公告。
    validations:
      required: true
  - type: checkboxes
    id: confirmation
    attributes:
      label: 确认
      options:
        - label: 我没有编造预算、发布时间、成交状态或合作机会。
          required: true
        - label: 我没有提交私人联系方式、截图或无法公开复核的信息。
          required: true
