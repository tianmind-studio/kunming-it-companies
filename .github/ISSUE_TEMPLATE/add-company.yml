name: Add company
description: 新增一家昆明 / 云南技术相关公司或团队
title: "[Add] 公司名称"
labels: ["data", "company"]
body:
  - type: markdown
    attributes:
      value: |
        感谢补充线索。不会 GitHub 也没关系，把公开来源贴出来即可。请不要提交私人手机号、私人微信或未经核实的负面信息。
  - type: input
    id: name
    attributes:
      label: 公司名称
      placeholder: 例如：昆明某某科技有限公司
    validations:
      required: true
  - type: input
    id: location
    attributes:
      label: 所在城市 / 区县
      placeholder: 例如：昆明市五华区；不确定可写“待确认”
    validations:
      required: true
  - type: input
    id: website
    attributes:
      label: 官网或公开主页
      placeholder: https://example.com
    validations:
      required: false
  - type: input
    id: hiring_page
    attributes:
      label: 招聘页 / 公司公开招聘主页
      description: 没有可以留空；不要填写私人联系方式。
      placeholder: https://...
    validations:
      required: false
  - type: input
    id: category
    attributes:
      label: 主要方向
      placeholder: 软件开发 / AI / 系统集成 / 医疗信息化 / 农业数字化
    validations:
      required: true
  - type: textarea
    id: tech_reason
    attributes:
      label: 为什么认为它属于技术相关公司？
      description: 请尽量基于公开页面描述，而不是口头印象。
      placeholder: 官网显示该公司提供软件开发、系统集成、数据平台等服务。
    validations:
      required: true
  - type: textarea
    id: sources
    attributes:
      label: 信息来源
      description: 请至少贴一个公开来源，官网、官方公众号、招聘页、政府公告、媒体报道都可以。
      placeholder: |
        - 官网：https://...
        - 招聘页：https://...
    validations:
      required: true
  - type: dropdown
    id: relationship
    attributes:
      label: 是否为本人所在公司 / 团队？
      options:
        - 否，只是公开线索
        - 是，我是公司/团队成员
        - 不方便说明
    validations:
      required: true

  - type: checkboxes
    id: public_source_confirmation
    attributes:
      label: 公开来源与隐私确认
      options:
        - label: 我提供的是公开可访问来源，不是私聊、截图或内部材料。
          required: true
        - label: 我没有提交私人联系方式、群二维码、无法核验的薪资/裁员/纠纷信息。
          required: true
        - label: 如果只是招聘平台搜索入口，我理解它只能作为来源种子，不代表正在招聘。
          required: true
