<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>昆明技术机会雷达 | Kunming Tech Radar</title>
    <meta name="description" content="Public radar for technology companies, jobs, events, communities, and digital project leads in Kunming and Yunnan.">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="site-header">
      <div class="header-copy">
        <p class="kicker">Kunming Tech Radar</p>
        <h1><span>昆明技术</span><span>机会雷达</span></h1>
        <p class="lede">整理昆明及云南范围内的技术公司、招聘机会、活动、社群和政府数字化项目线索。</p>
      </div>
      <img class="map-visual" src="assets/kunming-network.svg" alt="昆明各城区技术节点示意图">
    </header>

    <main>
      <section class="toolbar" aria-label="筛选公司">
        <label class="search-box">
          <span>搜索</span>
          <input id="searchInput" type="search" placeholder="公司名、方向、标签..." autocomplete="off">
        </label>
        <label>
          <span>方向</span>
          <select id="categorySelect">
            <option value="">全部方向</option>
          </select>
        </label>
        <label>
          <span>来源</span>
          <select id="verificationSelect">
            <option value="">全部来源</option>
            <option value="official_site">官网</option>
            <option value="official_profile">官方主页</option>
            <option value="community_pending">待核验</option>
          </select>
        </label>
      </section>

      <section class="stats" aria-label="数据统计">
        <div>
          <strong id="companyCount">0</strong>
          <span>companies</span>
        </div>
        <div>
          <strong id="verifiedCount">0</strong>
          <span>verified</span>
        </div>
        <div>
          <strong id="pendingCount">0</strong>
          <span>needs review</span>
        </div>
        <div>
          <strong id="sourceDate">-</strong>
          <span>last update</span>
        </div>
      </section>

      <section class="section-title">
        <h2>公司列表</h2>
        <p id="resultSummary" aria-live="polite">正在加载数据...</p>
      </section>

      <section id="companyList" class="company-list" aria-label="公司列表"></section>
    </main>

    <footer class="site-footer">
      <p>Source-backed facts only. No ranking, no blacklist, no private contact data.</p>
      <a href="COMPANIES.md" aria-label="View the GitHub company index">View company index</a>
    </footer>

    <script src="script.js" type="module"></script>
  </body>
</html>
